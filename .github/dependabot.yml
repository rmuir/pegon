---
# yaml-language-server: $schema=https://www.schemastore.org/dependabot-2.0.json
version: 2
updates:
  # dependent actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ci(actions)
    groups:
      Actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - skip-changelog

  # linters via prek
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ci(python)
    groups:
      Python:
        patterns:
          - "*"
    labels:
      - dependencies
      - skip-changelog

  # vscode extension dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
    groups:
      Node:
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
      - skip-changelog

  # application dependencies
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
    groups:
      Rust:
        patterns:
          - "*"
    labels:
      - dependencies
      - skip-changelog
