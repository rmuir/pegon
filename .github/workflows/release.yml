---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release
on:
  # for dry-runs
  workflow_dispatch:
  push:
    tags: ["*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Not updated by dependabot
  MATURIN_VERSION: v1.14.1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  # Creates a draft release that assets can be attached to
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # must create a draft release
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --verify-tag --generate-notes --draft
        env:
          GH_TOKEN: ${{ github.token }}

  pypi-linux:
    name: Create PyPI linux wheels
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            maturin_target: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04
            maturin_target: x86
            target: i686-unknown-linux-gnu
          - runner: ubuntu-22.04
            maturin_target: aarch64
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-22.04
            maturin_target: armv7
            target: armv7-unknown-linux-gnueabihf
          - runner: ubuntu-22.04
            maturin_target: s390x
            target: s390x-unknown-linux-gnu
          - runner: ubuntu-22.04
            maturin_target: ppc64le
            target: powerpc64le-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.platform.maturin_target }}
          args: --release --locked --out dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-linux-${{ matrix.platform.maturin_target }}
          if-no-files-found: error
          path: dist

      - name: Archive binary
        run: |
          mkdir assets
          cd "target/${TARGET}/release"
          tar cvfz "../../../assets/pegon-${TARGET}.tar.gz" pegon
        env:
          TARGET: ${{ matrix.platform.target }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assets-${{ matrix.platform.target }}
          if-no-files-found: error
          path: assets

  pypi-musllinux:
    name: Create PyPI musllinux wheels
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            maturin_target: x86_64
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-22.04
            maturin_target: x86
            target: i686-unknown-linux-musl
          - runner: ubuntu-22.04
            maturin_target: aarch64
            target: aarch64-unknown-linux-musl
          - runner: ubuntu-22.04
            maturin_target: armv7
            target: armv7-unknown-linux-musleabihf
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.platform.maturin_target }}
          args: --release --locked --out dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-musllinux-${{ matrix.platform.maturin_target }}
          if-no-files-found: error
          path: dist

      - name: Archive binary
        run: |
          mkdir assets
          cd "target/${TARGET}/release"
          tar cvfz "../../../assets/pegon-${TARGET}.tar.gz" pegon
        env:
          TARGET: ${{ matrix.platform.target }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assets-${{ matrix.platform.target }}
          if-no-files-found: error
          path: assets

  pypi-windows:
    name: Create PyPI windows wheels
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            maturin_target: x64
            target: x86_64-pc-windows-msvc
          - runner: windows-latest
            maturin_target: x86
            target: i686-pc-windows-msvc
          - runner: windows-11-arm
            maturin_target: aarch64
            target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.platform.maturin_target }}
          args: --release --locked --out dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.maturin_target }}
          if-no-files-found: error
          path: dist

      - name: Archive binary
        run: |
          mkdir assets
          cd "target/${TARGET}/release"
          7z a "../../../assets/pegon-${TARGET}.zip" pegon.exe
        shell: bash
        env:
          TARGET: ${{ matrix.platform.target }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assets-${{ matrix.platform.target }}
          if-no-files-found: error
          path: assets

  pypi-macos:
    name: Create PyPI macos wheels
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            maturin_target: x86_64
            target: x86_64-apple-darwin
          - runner: macos-latest
            maturin_target: aarch64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.platform.maturin_target }}
          args: --release --locked --out dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-macos-${{ matrix.platform.maturin_target }}
          if-no-files-found: error
          path: dist

      - name: Archive binary
        run: |
          mkdir assets
          cd "target/${TARGET}/release"
          tar cvfz "../../../assets/pegon-${TARGET}.tar.gz" pegon
        env:
          TARGET: ${{ matrix.platform.target }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assets-${{ matrix.platform.target }}
          if-no-files-found: error
          path: assets

  pypi-sdist:
    name: Create PyPI source distribution
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-sdist
          if-no-files-found: error
          path: dist

  # Download our built wheels, extract built binary, create native extension
  vsix-packages:
    name: Create vsix packages
    needs:
      - pypi-linux
      - pypi-musllinux
      - pypi-macos
      - pypi-windows
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Build vsix packages
        run: make vscode-packages

      - name: Upload vsix artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix-packages
          if-no-files-found: error
          path: dist

  # Removes draft to publish the release only if everything worked
  finish-release:
    name: Finish release
    needs:
      - create-release
      - pypi-linux
      - pypi-musllinux
      - pypi-macos
      - pypi-sdist
      - pypi-windows
      - vsix-packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # must finalize the release
      id-token: write # sign the provenance attestation
      attestations: write # Generate attestation data
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Download assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: assets-*
          path: assets
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        if: ${{ github.event_name != 'workflow_dispatch' }}
        with:
          subject-path: "assets/*"

      - name: Upload release assets
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: gh release upload "${GITHUB_REF_NAME}" ./*.tar.gz ./*.zip
        working-directory: assets
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Finish release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}

  # Separate job for security purposes
  publish-crates:
    name: Publish to crates.io
    needs:
      - finish-release
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crates
    permissions:
      id-token: write # required for OIDC token exchange
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Separate job for security purposes
  publish-pypi:
    name: Publish to pypi.org
    needs:
      - finish-release
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: pypi
    permissions:
      id-token: write # required for OIDC token exchange
      contents: write # maturin claims its needed, possibly just read...
      attestations: write # generate artifact attestations
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Generate artifact attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: "wheels-*/*"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always 'wheels-*/*'

  # Separate job for security purposes
  publish-ovsx:
    name: Publish to Open VSX
    needs:
      - finish-release
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: openvsx
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Publish to Open VSX
        run: npx ovsx publish -i vsix-packages/*.vsix --skip-duplicate
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # Separate job for security purposes
  publish-vscode:
    name: Publish to VSCode
    needs:
      - finish-release
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: vscode
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Publish to Open VSX
        run: npx @vscode/vsce publish -i vsix-packages/*.vsix --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
