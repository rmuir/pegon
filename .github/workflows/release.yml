---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release
on:
  # for dry-runs
  workflow_dispatch:
  push:
    tags: ["*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Creates a draft release that assets can be attached to
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # must create a draft release
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --verify-tag --generate-notes --draft
        env:
          GH_TOKEN: ${{ github.token }}

  # Removes draft to publish the release only if everything worked
  finish-release:
    name: Finish release
    needs:
      - create-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # must finalize the release
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Finish release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}

  # Separate job for security purposes
  publish-crates:
    name: Publish to crates.io
    needs:
      - finish-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crates
    permissions:
      id-token: write # required for OIDC token exchange
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
