---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

permissions: {}

env:
  # currently not bumped by dependabot
  TS_QUERY_LS_VERSION: "v3.15.1"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: CI checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Cache ts_query_ls binary
        id: cache-ts-query-ls
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.local/bin/ts_query_ls
          key: ts_query_ls-${{ env.TS_QUERY_LS_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Setup ts_query_ls
        if: ${{ steps.cache-ts-query-ls.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p ~/.local/bin
          curl --fail --location "${TS_QUERY_LS_DIST}" | tar -zxC ~/.local/bin ts_query_ls
        env:
          TS_QUERY_LS_DIST: "https://github.com/ribru17/ts_query_ls/releases/download/${{ env.TS_QUERY_LS_VERSION }}/ts_query_ls-x86_64-unknown-linux-gnu.tar.gz"

      - name: Add ts_query_ls to PATH
        run: echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false
          save-cache: ${{ github.event_name != 'pull_request' }}
          cache-dependency-glob: uv.lock
          cache-suffix: check

      - name: Setup rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run checks
        run: make lint
