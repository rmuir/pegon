[package]
name = "pegon"
description = "A slightly fast Java linter and code formatter, written in Rust."
version = "0.1.0"
edition = "2024"
readme = "README.md"
license = "Apache-2.0"
homepage = "https://github.com/rmuir/pegon"
repository = "https://github.com/rmuir/pegon"
documentation = "https://github.com/rmuir/pegon/wiki"
authors = ["Robert Muir <rmuir@apache.org>"]
keywords = ["java", "linter", "formatter", "language-server", "static-analysis"]
categories = ["command-line-utilities", "development-tools", "text-editors"]

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"

[profile.dev]
debug = "line-tables-only"
lto = "off"

[dependencies]
# Templates diagnostic errors
aho-corasick = "1.1.4"
# Renders console diagnostics
annotate-snippets = { version = "0.12.11" }
# ANSI styling of console output
anstream = "0.6.21"
# Error handling
anyhow = "1.0.101"
# Caching already-processed files
blake3 = "1.8.3"
# CLI argument processing
clap = { version = "4.5.58", features = ["derive"] }
# Traversing directories, respecting ignore files
ignore = "0.4.25"
# language server (encoding conversion?)
ropey = "1.6.1"
# language server
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros", "io-std"] }
# language server
tower-lsp-server = { version = "0.23.0", features = ["proposed"] }
# Parser framework
tree-sitter = "0.26.5"
# Parser for java language
tree-sitter-java = "0.23.5"

[lints]
workspace = true

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }

#cargo_common_metadata = "allow"
#cast_precision_loss = "allow"
#cast_lossless = "allow"
#cast_sign_loss = "allow"
#cognitive_complexity = "allow"
#items_after_statements = "allow"
#option_if_let_else = "allow"
#redundant_closure_for_method_calls = "allow"
#too_many_lines = "allow"
#significant_drop_tightening = "allow"
cast-possible-truncation = "allow"
multiple_crate_versions = "allow"
