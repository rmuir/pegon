[package]
name = "pegon"
description = "A slightly fast Java linter and code formatter, written in Rust."
version = "0.1.0"
edition = "2024"
readme = "README.md"
license = "Apache-2.0"
repository = "https://github.com/rmuir/pegon"
documentation = "https://github.com/rmuir/pegon/wiki"


[profile.release]
lto = true
strip = true
opt-level = 3
codegen-units = 1

[profile.profiling]
inherits = "release"
lto = false
strip = false
opt-level = 1
codegen-units = 16

[dependencies]
# Renders console diagnostics
annotate-snippets = "0.12.11"
# ANSI styling
anstream = "0.6.21"
# Caching already-processed files
blake3 = "1.8.3"
# Traversing directories, respecting ignore files
ignore = "0.4.25"
# Parsing system
tree-sitter = "0.26.5"
# Parser for java
tree-sitter-java = "0.23.5"
