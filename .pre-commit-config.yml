---
# yaml-language-server: $schema=https://raw.githubusercontent.com/j178/prek/refs/heads/master/prek.schema.json
minimum_prek_version: 0.2.29
default_install_hook_types:
  - pre-commit
  - pre-push
default_stages:
  - pre-commit
  - pre-push
# define priority: 0 for linters that don't modify sources
# leave fixers with priority: null so they run sequentially
repos:
  # "Built-in Fast Hooks" from prek.
  - repo: builtin
    hooks:
      - id: check-added-large-files
        name: Check for large files
        priority: 0

      - id: check-case-conflict
        name: Check for files that would conflict in case-insensitive filesystems
        priority: 0

      - id: trailing-whitespace
        name: Fix trailing whitespace
        types: [text]

      - id: end-of-file-fixer
        name: Fix newline at EOF

      - id: fix-byte-order-marker
        name: Fix UTF-8 byte order marker

      - id: check-json
        name: Check JSON files
        priority: 0
        types: [json]

      - id: check-toml
        name: Check TOML files
        priority: 0
        types: [toml]

      - id: check-yaml
        name: Check YAML files
        priority: 0
        types: [yaml]

      - id: mixed-line-ending
        name: Fix line endings
        types: [text]

      - id: check-merge-conflict
        name: Check for merge conflicts
        priority: 0

      - id: detect-private-key
        name: Check for private keys
        priority: 0

  - repo: local
    hooks:
      - id: actionlint
        name: Check Workflows
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "actionlint"]
        env:
          UV_FROZEN: "1"
        # run across all actions if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - .github/**/*.yml

      - id: jsonschema-github-workflows
        name: Check Workflows Schema
        priority: 0
        require_serial: true
        language: system
        entry: uv
        args: ["run", "--only-dev", "check-jsonschema", "--builtin-schema", "vendor.github-workflows"]
        env:
          UV_FROZEN: "1"
        types: [yaml]
        files:
          glob:
            - ".github/workflows/*.{yml,yaml}"

      - id: jsonschema-github-workflow-timeouts
        name: Check Workflows Timeouts
        priority: 0
        require_serial: true
        language: system
        entry: uv
        args: ["run", "--only-dev", "check-jsonschema", "--builtin-schema", "custom.github-workflows-require-timeout"]
        env:
          UV_FROZEN: "1"
        types: [yaml]
        files:
          glob:
            - ".github/workflows/*.{yml,yaml}"

      - id: zizmor
        name: Check Workflows Security
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "zizmor", "--pedantic", "--offline", "."]
        env:
          UV_FROZEN: "1"
        # run across all actions if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - .github/**/*.yml

      - id: validate-pyproject
        name: Check pyproject.toml
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "validate-pyproject"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        files:
          glob:
            - pyproject.toml

      - id: typos
        name: Check spelling
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "typos", "--force-exclude"]
        env:
          UV_FROZEN: "1"
        require_serial: true

      - id: rumdl
        name: Fix Markdown
        language: system
        entry: uv
        args: ["run", "--only-dev", "rumdl", "check", "--fix"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        types: ["markdown"]

      - id: yamlfmt
        name: Fix YAML
        language: system
        entry: uv
        args: ["run", "--only-dev", "yamlfmt"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        types: ["yaml"]

      - id: cargo-check
        name: Check Rust compilation
        stages: [pre-push]
        priority: 0
        language: system
        entry: cargo
        args: ["check"]
        env:
          RUSTFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - "**/*.rs"

      - id: cargo-clippy
        name: Check Rust lints
        stages: [pre-push]
        priority: 0
        language: system
        entry: cargo
        args: ["clippy", "--", "-D", "warnings"]
        env:
          RUSTFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - "**/*.rs"

      - id: cargo-test
        name: Check Rust tests
        stages: [pre-push]
        priority: 0
        language: system
        entry: cargo
        args: ["test"]
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D warnings"
        # run across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - "**/*.rs"

      - id: cargo-deny
        name: Check Rust dependencies
        priority: 0
        language: system
        entry: cargo
        args: ["deny", "check"]
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - deny.toml

      - id: cargo-fix
        name: Fix Rust problems
        stages: [pre-push]
        language: system
        pass_filenames: false
        require_serial: true
        entry: cargo
        args: ["fix", "--allow-dirty", "--allow-staged"]
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D warnings"
        types: ["rust"]

      - id: cargo-fmt
        name: Fix Rust formatting
        language: system
        entry: cargo
        args: ["fmt", "--all"]
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        types: [rust]

      - id: cargo-xtask
        name: Fix regenerated sources
        language: system
        entry: cargo
        args: ["xtask", "generate"]
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        types: [rust]

      # TODO: figure out a simple installation path for the parser
      # - id: query-fix
      #   name: Fix Queries
      #   language: system
      #   entry: ts_query_ls
      #   require_serial: true
      #   args: ["check", "--fix"]
      #   types: [scheme]

      - id: query-format
        name: Fix Queries formatting
        language: system
        entry: ts_query_ls
        require_serial: true
        args: ["format"]
        types: [scheme]

  # self-checks for this configuration file
  - repo: meta
    hooks:
      - id: check-hooks-apply
        name: Check prek hooks match at least one file
        priority: 0
        files:
          glob:
            - .pre-commit-config.yml

      - id: check-useless-excludes
        name: Check prek excludes match include pattern
        priority: 0
        files:
          glob:
            - .pre-commit-config.yml
