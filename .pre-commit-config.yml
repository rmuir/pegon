---
# yaml-language-server: $schema=https://raw.githubusercontent.com/j178/prek/refs/heads/master/prek.schema.json
minimum_prek_version: 0.4.0
default_install_hook_types:
  - pre-commit
  - commit-msg
# define priority: 0 for linters that don't modify sources
# leave fixers with priority: null so they run sequentially
repos:
  # "Built-in Fast Hooks" from prek.
  - repo: builtin
    hooks:
      - id: check-added-large-files
        name: Check for large files
        priority: 0

      - id: check-case-conflict
        name: Check for case conflicts
        priority: 0

      - id: trailing-whitespace
        name: Fix trailing whitespace
        types: [text]

      - id: end-of-file-fixer
        name: Fix newline at EOF

      - id: fix-byte-order-marker
        name: Fix UTF-8 byte order marker

      - id: check-json
        name: Check JSON files
        priority: 0
        types: [json]

      - id: pretty-format-json
        name: Fix JSON formatting
        require_serial: true
        args: ["--autofix", "--no-sort-keys"]
        types: [json]
        exclude:
          glob:
            - "**/package-lock.json"

      - id: check-toml
        name: Check TOML files
        priority: 0
        types: [toml]

      - id: check-yaml
        name: Check YAML files
        priority: 0
        types: [yaml]

      - id: mixed-line-ending
        name: Fix line endings
        types: [text]

      - id: check-merge-conflict
        name: Check for merge conflicts
        priority: 0

      - id: check-vcs-permalinks
        name: Check for permanent VCS links
        priority: 0
        require_serial: true
        types: [text]

      - id: detect-private-key
        name: Check for private keys
        priority: 0

  - repo: local
    hooks:
      - id: actionlint
        name: Check Workflows
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "actionlint"]
        env:
          UV_FROZEN: "1"
        # run across all actions if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - .github/**/*.yml

      - id: jsonschema-dependabot
        name: Check Dependabot Schema
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "check-jsonschema", "--builtin-schema", "vendor.dependabot"]
        env:
          UV_FROZEN: "1"
        types: [yaml]
        files:
          glob:
            - ".github/dependabot.yml"

      - id: jsonschema-release
        name: Check Release Schema
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "check-jsonschema", "--schemafile", "https://www.schemastore.org/github-release-config.json"]
        env:
          UV_FROZEN: "1"
        types: [yaml]
        files:
          glob:
            - ".github/release.yml"

      - id: jsonschema-github-workflows
        name: Check Workflows Schema
        priority: 0
        require_serial: true
        language: system
        entry: uv
        args: ["run", "--only-dev", "check-jsonschema", "--builtin-schema", "vendor.github-workflows"]
        env:
          UV_FROZEN: "1"
        types: [yaml]
        files:
          glob:
            - ".github/workflows/*.{yml,yaml}"

      - id: jsonschema-github-workflow-timeouts
        name: Check Workflows Timeouts
        priority: 0
        require_serial: true
        language: system
        entry: uv
        args: ["run", "--only-dev", "check-jsonschema", "--builtin-schema", "custom.github-workflows-require-timeout"]
        env:
          UV_FROZEN: "1"
        types: [yaml]
        files:
          glob:
            - ".github/workflows/*.{yml,yaml}"

      - id: zizmor
        name: Check Workflows Security
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "zizmor", "--persona", "auditor", "--offline", "."]
        env:
          UV_FROZEN: "1"
        # run across all actions if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - .github/**/*.yml

      - id: validate-pyproject
        name: Check pyproject.toml
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "validate-pyproject"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        files:
          glob:
            - pyproject.toml

      - id: typos
        name: Check spelling
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "typos", "--force-exclude"]
        env:
          UV_FROZEN: "1"
        require_serial: true

      - id: tombi-lint
        name: Check TOML schema
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "tombi", "lint"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        types: ["toml"]

      - id: tombi-format
        name: Fix TOML formatting
        language: system
        entry: uv
        args: ["run", "--only-dev", "tombi", "format"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        types: ["toml"]
        exclude:
          glob:
            - "**/uv.lock"
            - "**/Cargo.lock"

      - id: yamllint
        name: Check YAML lints
        priority: 0
        language: system
        entry: uv
        args: ["run", "--only-dev", "yamllint", "--strict", "."]
        env:
          UV_FROZEN: "1"
        require_serial: true
        types: ["yaml"]

      - id: rumdl
        name: Fix Markdown
        language: system
        entry: uv
        args: ["run", "--only-dev", "rumdl", "check", "--fix"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        types: ["markdown"]

      - id: yamlfmt
        name: Fix YAML formatting
        language: system
        entry: uv
        args: ["run", "--only-dev", "yamlfmt"]
        env:
          UV_FROZEN: "1"
        require_serial: true
        types: ["yaml"]

      - id: cargo-check
        name: Check Rust compilation
        priority: 0
        language: system
        entry: cargo
        args: ["check", "--all-targets"]
        env:
          RUSTFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - "**/*.rs"

      - id: cargo-clippy
        name: Check Rust lints
        priority: 0
        language: system
        entry: cargo
        args: ["clippy", "--all-targets", "--", "-D", "warnings"]
        env:
          RUSTFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - "**/*.rs"

      - id: cargo-doc
        name: Check Rust docs
        priority: 0
        language: system
        entry: cargo
        args: ["doc", "--no-deps", "--document-private-items", "--all-features"]
        env:
          RUSTFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - "**/*.rs"

      - id: cargo-test
        name: Check Rust tests
        priority: 0
        language: system
        entry: cargo
        args: ["test"]
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D warnings"
        # run across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - "**/*.rs"

      - id: cargo-deny
        name: Check Rust dependencies
        priority: 0
        language: system
        entry: cargo
        args: ["deny", "check"]
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        files:
          glob:
            - Cargo.toml
            - Cargo.lock
            - deny.toml

      - id: query-check
        name: Check Queries
        priority: 0
        language: system
        entry: ts_query_ls
        require_serial: true
        args: ["check"]
        types: [scheme]

      - id: cargo-fix
        name: Fix Rust problems
        language: system
        pass_filenames: false
        require_serial: true
        entry: cargo
        args: ["fix", "--allow-dirty", "--allow-staged"]
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D warnings"
        types: ["rust"]

      - id: cargo-fmt
        name: Fix Rust formatting
        language: system
        entry: cargo
        args: ["fmt", "--all"]
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D warnings"
        # runs across all files if any are touched
        require_serial: true
        pass_filenames: false
        types: [rust]

      - id: query-format
        name: Fix Queries formatting
        language: system
        entry: ts_query_ls
        require_serial: true
        args: ["format"]
        types: [scheme]

      - id: committed
        name: Check Commit message
        language: system
        entry: uv
        args: ["run", "--only-dev", "committed", "--commit-file"]
        env:
          UV_FROZEN: "1"
        stages: [commit-msg]

  # self-checks for this configuration file
  - repo: meta
    hooks:
      - id: check-hooks-apply
        name: Check hooks match files
        priority: 0
        files:
          glob:
            - .pre-commit-config.yml

      - id: check-useless-excludes
        name: Check excludes match includes
        priority: 0
        files:
          glob:
            - .pre-commit-config.yml
